<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bite & Delight | Shop Order System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; }
        .brand-maroon { background-color: #700d16; }
        .brand-gold { background-color: #c5a059; }
        .text-gold { color: #c5a059; }
        .hero-gradient { background: linear-gradient(180deg, #700d16 0%, #3a070c 100%); }
        .cart-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: flex-end; }
        .cart-modal.active { display: flex; }
    </style>
</head>
<body class="pb-10">

    <header class="brand-maroon text-white p-4 sticky top-0 z-50 flex justify-between items-center border-b border-gold/30">
        <div>
            <h1 class="text-xl font-black text-gold uppercase italic tracking-tighter">Bite & Delight</h1>
            <p class="text-[10px] font-bold opacity-80 uppercase">Mumbai's Best Street Food</p>
        </div>
        <button onclick="toggleCart()" class="brand-gold text-white px-5 py-2 rounded-xl font-black text-xs shadow-lg">
            🛒 CART (<span id="cart-count">0</span>)
        </button>
    </header>

    <div class="bg-black text-white text-center py-2 text-[9px] font-black uppercase tracking-widest">
        🛵 FREE DELIVERY ON ORDERS ₹199+
    </div>

    <main id="menu-container" class="p-5 max-w-md mx-auto space-y-12">
        </main>

    <footer class="brand-maroon text-white p-10 rounded-[40px] m-4 space-y-8 text-center border-t-8 border-gold">
        <h2 class="text-3xl font-black text-gold italic uppercase">Bite & Delight</h2>
        <div class="bg-white p-4 inline-block rounded-3xl border-4 border-gold">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=zaigham.turabi110-6@oksbi" class="w-32 h-32">
        </div>
        <p class="text-[10px] font-bold text-gold uppercase">Scan to pay with any UPI App</p>
        <p class="text-xs opacity-60">📍 317, Lokhandwala Chawl, Shop No. 325, West Bapty Road, Mumbai - 400008</p>
    </footer>

    <div id="cartModal" class="cart-modal">
        <div class="bg-white w-full rounded-t-[50px] p-8 max-h-[95vh] overflow-y-auto border-t-8 border-gold shadow-2xl">
            <h2 class="text-3xl font-black text-[#700d16] mb-6 italic uppercase tracking-tighter">Your Order Details</h2>
            
            <div id="cart-items" class="space-y-3 mb-8"></div>
            
            <div class="space-y-4 mb-8">
                <input id="uName" type="text" placeholder="CUSTOMER NAME" class="w-full bg-gray-100 p-4 rounded-2xl font-black border-none text-sm uppercase outline-none focus:ring-2 focus:ring-gold">
                <textarea id="uAddress" placeholder="FULL DELIVERY ADDRESS" class="w-full bg-gray-100 p-4 rounded-2xl font-black border-none h-24 text-sm uppercase outline-none focus:ring-2 focus:ring-gold"></textarea>
            </div>

            <div class="mb-8 p-5 bg-gray-50 rounded-[30px] border-2 border-dashed border-gray-200 text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Pay on Delivery via</p>
                <div class="grid grid-cols-3 gap-2">
                    <span class="bg-white p-2 rounded-xl text-[9px] font-bold border shadow-sm">G-Pay</span>
                    <span class="bg-white p-2 rounded-xl text-[9px] font-bold border shadow-sm">PhonePe</span>
                    <span class="bg-white p-2 rounded-xl text-[9px] font-bold border shadow-sm">Paytm</span>
                    <span class="bg-white p-2 rounded-xl text-[9px] font-bold border shadow-sm">Navi</span>
                    <span class="bg-white p-2 rounded-xl text-[9px] font-bold border shadow-sm">Bajaj Pay</span>
                    <span class="bg-white p-2 rounded-xl text-[9px] font-bold border shadow-sm">Cash</span>
                </div>
            </div>

            <div class="bg-black p-6 rounded-[30px] flex justify-between items-center mb-8 shadow-xl">
                <span class="font-black text-gray-400 uppercase text-[10px] tracking-widest">Total Pay</span>
                <span class="text-3xl font-black text-gold italic">₹<span id="cart-total">0</span></span>
            </div>

            <button onclick="sendToWorker()" class="w-full brand-maroon text-gold py-6 rounded-3xl font-black text-xl shadow-2xl uppercase italic tracking-tighter active:scale-95 transition-all">Send Order to Shop 🍔</button>
            <button onclick="toggleCart()" class="w-full text-gray-300 font-bold text-[10px] mt-6 uppercase tracking-widest">Add More Items</button>
        </div>
    </div>

    <script>
        const menuData = [
            { cat: "BURGERS", items: [
                {n:"Classic Chicken Burger", d:"Fresh patty & veggies", p:49},
                {n:"Chicken Cheese Burger", d:"Extra melty cheese", p:69},
                {n:"Tandoori Chicken Burger", d:"Smoky tandoori taste", p:89},
                {n:"Peri-Peri Chicken Burger", d:"Spicy peri-peri", p:79},
                {n:"Chicken Garlic Burger", d:"Garlic mayo blend", p:79}
            ]},
            { cat: "DESI BHEL", items: [
                {n:"Classic Bhel", d:"Mumbai original", p:20},
                {n:"Manchurian Bhel", d:"Fusion Chinese", p:30},
                {n:"Cheesy Bhel", d:"Cheese loaded", p:30},
                {n:"Peri-Peri Bhel", d:"Hot & spicy", p:30}
            ]},
            { cat: "FRIES", items: [
                {n:"Classic Fries", d:"Salted golden", p:50},
                {n:"Cheesy Fries", d:"Cheese dip", p:70},
                {n:"Peri-Peri Fries", d:"Fiery spice", p:70},
                {n:"Tandoori Fries", d:"Indian spices", p:70}
            ]},
            { cat: "COMBOS", items: [
                {n:"Saver Combo", d:"Burger+Fries+Drink", p:99},
                {n:"Family Feast", d:"4 Burgers + Large Sides", p:449}
            ]}
        ];

        let cart = [];

        function initMenu() {
            const container = document.getElementById('menu-container');
            menuData.forEach(section => {
                let html = `<div class="space-y-5">
                    <div class="flex items-center gap-3">
                        <div class="brand-maroon h-8 w-1.5 rounded-full"></div>
                        <h3 class="text-2xl font-black text-[#700d16] italic uppercase tracking-tighter">${section.cat}</h3>
                    </div>
                    <div class="grid gap-4">`;
                section.items.forEach(item => {
                    html += `<div class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 flex justify-between items-center">
                        <div class="flex-1 pr-4">
                            <h4 class="font-black text-gray-900 text-xs uppercase">${item.n}</h4>
                            <p class="text-[9px] text-gray-400 font-bold mb-2 uppercase">${item.d}</p>
                            <span class="text-gold font-black italic text-lg">₹${item.p}</span>
                        </div>
                        <button onclick="addToCart('${item.n}', ${item.p})" class="brand-gold text-white px-7 py-3 rounded-xl font-black text-[10px] uppercase shadow-md active:scale-90 transition-all">ADD</button>
                    </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function addToCart(n, p) { cart.push({n, p}); updateCart(); }
        
        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map((i, idx) => `<div class="flex justify-between font-black text-[10px] bg-gray-50 p-4 rounded-xl border border-gray-100 uppercase italic">
                <span class="text-gray-600">${i.n}</span>
                <div class="flex items-center gap-4">
                    <span class="text-gold">₹${i.p}</span>
                    <button onclick="removeItem(${idx})" class="text-red-500 font-black">✕</button>
                </div>
            </div>`).join('');
            document.getElementById('cart-total').innerText = cart.reduce((s, i) => s + i.p, 0);
        }

        function removeItem(idx) { cart.splice(idx, 1); updateCart(); }
        function toggleCart() { document.getElementById('cartModal').classList.toggle('active'); }

        function sendToWorker() {
            const name = document.getElementById('uName').value;
            const addr = document.getElementById('uAddress').value;
            if(!name || !addr) return alert("Please enter Customer Name & Full Address!");
            if(cart.length === 0) return alert("Cart is empty!");
            
            // Generate full item list for the shop worker
            let foodList = "";
            cart.forEach((item, index) => {
                foodList += `${index + 1}. ${item.n} - ₹${item.p}%0A`;
            });
            
            const total = document.getElementById('cart-total').innerText;
            const myWhatsApp = "918090444814";
            
            // Professional formatted message for the shop worker
            const message = `*🚨 NEW BITE AND DELIGHT ORDER*%0A---%0A*CUSTOMER:* ${name}%0A*ADDRESS:* ${addr}%0A---%0A*ITEMS TO PREPARE:*%0A${foodList}%0A---%0A*TOTAL BILL: ₹${total}*%0A---%0A*PAYMENT:* GPay/PhonePe/Cash%0A---%0A_Please start preparing the order!_`;
            
            window.open(`https://api.whatsapp.com/send?phone=${myWhatsApp}&text=${message}`);
        }

        initMenu();
    </script>
</body>
</html>
